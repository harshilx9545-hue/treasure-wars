<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Bedwars</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }
    #crosshair { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      color: #fff; font-size: 20px; text-shadow: 0 0 3px #000; pointer-events: none; user-select: none; }
    #hotbar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; pointer-events: none; }
    .slot { width: 48px; height: 48px; border: 2px solid rgba(255,255,255,.5); border-radius: 6px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 11px; background: rgba(0,0,0,.35); text-shadow: 0 1px 2px #000; }
    .slot.active { border-color: #fff; background: rgba(255,255,255,.2); }
    .slot .swatch { width: 18px; height: 18px; border-radius: 3px; margin-bottom: 2px; }
    #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 16px; color: #fff; background: rgba(0,0,0,.55); font-size: 18px; cursor: pointer; }
    #stats { position: fixed; top: 8px; left: 8px; color: #fff; font: 12px/1.5 monospace;
      text-shadow: 0 1px 2px #000; pointer-events: none; }
    #hearts { position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
      color: #e53935; font-size: 18px; letter-spacing: 2px; text-shadow: 0 1px 2px #000; pointer-events: none; }
    #scoreboard { position: fixed; top: 8px; right: 8px; width: 170px; background: rgba(0,0,0,.45);
      border-radius: 6px; padding: 8px 10px; color: #fff; font-size: 12px; pointer-events: none; }
    .sb-title { text-align: center; font-weight: 700; letter-spacing: 2px; color: #ffd54f; margin-bottom: 6px; }
    .sb-row { display: flex; justify-content: space-between; margin: 2px 0; }
    .sb-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; }
    #killfeed { position: fixed; top: 8px; right: 190px; display: flex; flex-direction: column;
      gap: 4px; align-items: flex-end; pointer-events: none; }
    .feed { color: #fff; font-size: 12px; background: rgba(0,0,0,.45); padding: 3px 8px;
      border-radius: 4px; text-shadow: 0 1px 2px #000; }
    #status { position: fixed; top: 35%; left: 0; right: 0; text-align: center; color: #fff;
      font-size: 34px; font-weight: 700; text-shadow: 0 2px 6px #000; pointer-events: none; display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="crosshair">+</div>
  <div id="stats"></div>
  <div id="hearts"></div>
  <div id="scoreboard"></div>
  <div id="killfeed"></div>
  <div id="status"></div>
  <div id="hotbar"></div>
  <div id="overlay">Click to play — WASD move, Shift sprint, Space jump, LMB break, RMB place, 1–4 select block</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
